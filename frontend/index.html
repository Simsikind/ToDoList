<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo List App</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✅</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1 style="margin: 0;">ToDo List</h1>
            <div id="clock" style="font-size: 1.5em; font-weight: bold; color: #333;"></div>
        </div>

        <!-- Auth Section -->
        <div id="auth-section">
            <p id="auth-message"></p>
            
            <!-- Login Form -->
            <form id="login-form">
                <h2>Login</h2>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required>
                </div>
                <button type="submit">Login</button>
                <p>Don't have an account? <a href="#" id="show-register">Register</a></p>
            </form>

            <!-- Register Form -->
            <form id="register-form" class="hidden">
                <h2>Register</h2>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required>
                </div>
                <div class="form-group">
                    <label>Creation Password (Admin Only)</label>
                    <input type="password" name="creation_password" required>
                </div>
                <button type="submit">Register</button>
                <p>Already have an account? <a href="#" id="show-login">Login</a></p>
            </form>
        </div>

        <!-- App Section -->
        <div id="app-section" class="hidden">
            <!-- Alerts Section -->
            <div id="alerts-section" class="hidden" style="margin-bottom: 20px;">
                <div style="background-color: #fff3cd; color: #856404; padding: 15px; border: 1px solid #ffeeba; border-radius: 5px;">
                    <h3 style="margin-top: 0; margin-bottom: 10px; color: #856404;">⚠️ Attention Needed</h3>
                    <ul id="alerts-list" style="margin: 0; padding-left: 20px;"></ul>
                </div>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2>My Todos</h2>
                <div>
                    <button id="open-todo-modal">New Task</button>
                    <button id="change-pw-btn" class="secondary">Change Password</button>
                    <button id="logout-btn" class="secondary">Logout</button>
                </div>
            </div>

            <!-- Modal for New Task -->
            <div id="todo-modal" class="modal hidden">
                <div class="modal-content">
                    <span id="close-modal" class="close">&times;</span>
                    <h2>Add New Task</h2>
                    <form id="todo-form">
                        <div class="form-group">
                            <label>New Task</label>
                            <input type="text" name="title" placeholder="What needs to be done? (Max 50 chars)" maxlength="50" required>
                        </div>
                        <div class="form-group">
                            <label>Description</label>
                            <textarea name="description" placeholder="Optional details... (Max 200 chars)" maxlength="200" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; resize: vertical;"></textarea>
                        </div>
                        <div class="form-group">
                            <label>Priority (0-2)</label>
                            <input type="number" name="priority" value="0" min="0" max="2">
                        </div>
                        <div class="form-group">
                            <label>Due Date</label>
                            <input type="date" name="dueDate">
                        </div>
                        <div class="form-group">
                            <label>Remind From</label>
                            <input type="datetime-local" name="remindFrom">
                        </div>
                        <button type="submit">Add Todo</button>
                    </form>
                </div>
            </div>

            <!-- Modal for Edit Task -->
            <div id="edit-modal" class="modal hidden">
                <div class="modal-content">
                    <span id="close-edit-modal" class="close">&times;</span>
                    <h2>Edit Task</h2>
                    <form id="edit-form">
                        <input type="hidden" name="id">
                        <div class="form-group">
                            <label>Task Title</label>
                            <input type="text" name="title" placeholder="Task title (Max 50 chars)" maxlength="50" required>
                        </div>
                        <div class="form-group">
                            <label>Description</label>
                            <textarea name="description" placeholder="Description (Max 200 chars)" maxlength="200" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; resize: vertical;"></textarea>
                        </div>
                        <div class="form-group">
                            <label>Priority (0-2)</label>
                            <input type="number" name="priority" min="0" max="2">
                        </div>
                        <div class="form-group">
                            <label>Due Date</label>
                            <input type="date" name="dueDate">
                        </div>
                        <div class="form-group">
                            <label>Remind From</label>
                            <input type="datetime-local" name="remindFrom">
                        </div>
                        <div class="form-group" style="display: flex; align-items: center; gap: 10px;">
                            <input type="checkbox" name="done" id="edit-done" style="width: auto;">
                            <label for="edit-done" style="margin: 0;">Mark as Done</label>
                        </div>
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 20px;">
                            <button type="submit">Save Changes</button>
                            <button type="button" id="delete-todo-btn" class="danger">Delete</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Filter Section -->
            <div style="background: #fff; padding: 15px; border: 1px solid #eee; border-radius: 5px; margin-bottom: 20px;">
                <h3>Filters</h3>
                <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <div class="form-group" style="flex: 1; min-width: 150px;">
                        <label>Status</label>
                        <select id="filter-status" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                            <option value="all">All</option>
                            <option value="active">Active (Not Done)</option>
                            <option value="done">Completed</option>
                        </select>
                    </div>
                    <div class="form-group" style="flex: 1; min-width: 150px;">
                        <label>Priority</label>
                        <select id="filter-priority" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                            <option value="all">All</option>
                            <option value="2">High (2)</option>
                            <option value="1">Medium (1)</option>
                            <option value="0">Low (0)</option>
                        </select>
                    </div>
                    <div class="form-group" style="flex: 1; min-width: 150px;">
                        <label>Due Date From</label>
                        <input type="date" id="filter-date-from">
                    </div>
                    <div class="form-group" style="flex: 1; min-width: 150px;">
                        <label>Due Date To</label>
                        <input type="date" id="filter-date-to">
                    </div>
                    <div class="form-group" style="flex: 1; min-width: 150px;">
                        <label>Sort By</label>
                        <select id="sort-by" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                            <option value="created">Created (Default)</option>
                            <option value="priority">Priority (High to Low)</option>
                            <option value="dueDate">Due Date (Earliest first)</option>
                        </select>
                    </div>
                    <div class="form-group" style="display: flex; align-items: flex-end; gap: 5px;">
                        <button id="clear-filters" class="secondary">Clear</button>
                        <select id="export-format" style="padding: 8px; border: 1px solid #ddd; border-radius: 4px; height: 41px; cursor: pointer;">
                            <option value="html">HTML</option>
                            <option value="pos">POS (Txt)</option>
                        </select>
                        <button id="download-todos" style="background-color: #007bff;">Export</button>
                    </div>
                </div>
            </div>

            <ul id="todo-list">
                <!-- Todos will be inserted here -->
            </ul>
        </div>
    </div>

    <!-- Change Password Modal -->
    <div id="change-pw-modal" class="modal hidden">
        <div class="modal-content">
            <span id="close-pw-modal" class="close">&times;</span>
            <h2>Change Password</h2>
            <form id="change-pw-form">
                <div class="form-group">
                    <label>Old Password</label>
                    <input type="password" name="oldPassword" required>
                </div>
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" name="newPassword" required>
                </div>
                <button type="submit">Update Password</button>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
